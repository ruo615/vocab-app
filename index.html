<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vocab Master - Quiz Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .glass-header { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .word-card { border-left: 4px solid #6366f1; transition: transform 0.1s; }
        .zh-text { max-height: 0; overflow: hidden; transition: all 0.3s ease; opacity: 0; }
        .zh-text.show { max-height: 100px; opacity: 1; margin-top: 8px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* 測驗彈窗樣式 */
        #quiz-modal { display: none; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .option-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-24">

    <div class="glass-header safe-top pb-8 px-6 text-white shadow-2xl rounded-b-[40px]">
        <div class="pt-8">
            <h1 class="text-2xl font-extrabold tracking-tight">Vocab Master</h1>
            <p class="text-white/70 text-xs">智能測驗口袋書</p>
        </div>
        <div class="mt-8 flex justify-between items-end">
            <div>
                <span class="text-5xl font-extrabold" id="count">0</span>
                <span class="text-sm font-semibold opacity-80 ml-1">WORDS</span>
            </div>
            <button onclick="shuffle()" class="bg-white/20 hover:bg-white/30 backdrop-blur-lg px-5 py-2.5 rounded-2xl text-sm font-bold transition-all">
                🔀 隨機亂序
            </button>
        </div>
    </div>

    <div class="flex gap-3 px-6 -mt-5 overflow-x-auto no-scrollbar relative z-10">
        <button onclick="setFilter('全部')" class="tab-btn active bg-white text-indigo-600 shadow-lg px-6 py-3 rounded-2xl text-sm font-bold transition-all border border-indigo-50">全部</button>
        <button onclick="setFilter('課堂')" class="tab-btn bg-white/80 text-slate-500 shadow-sm px-6 py-3 rounded-2xl text-sm font-bold transition-all">課堂</button>
        <button onclick="setFilter('課堂2')" class="tab-btn bg-white/80 text-slate-500 shadow-sm px-6 py-3 rounded-2xl text-sm font-bold transition-all">課堂2</button>
    </div>

    <div class="px-6 mt-8">
        <div class="bg-white p-6 rounded-[30px] shadow-sm border border-slate-100">
            <div class="grid grid-cols-1 gap-3">
                <input type="text" id="en-input" placeholder="English Word" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-400 outline-none font-semibold">
                <input type="text" id="zh-input" placeholder="中文翻譯" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-400 outline-none font-semibold">
                <div class="flex gap-3">
                    <select id="cat-input" class="bg-slate-50 rounded-2xl px-4 text-slate-500 font-bold text-sm outline-none">
                        <option value="課堂">課堂</option>
                        <option value="多益">多益</option>
                        <option value="生活">生活</option>
                    </select>
                    <button id="add-btn" class="flex-1 bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 active:bg-indigo-700 transition-all">
                        ＋ 新增
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="vocab-list" class="px-6 mt-8 space-y-4"></div>

    <div class="fixed bottom-6 left-0 right-0 px-6 flex gap-3">
        <button onclick="startQuiz()" class="flex-1 bg-purple-600 text-white font-black py-5 rounded-3xl shadow-xl shadow-purple-200 flex items-center justify-center gap-2">
            📝 開始測驗
        </button>
        <button onclick="resetData()" class="px-6 bg-white text-slate-400 font-bold rounded-3xl border border-slate-100 shadow-sm text-xs">
            RESET
        </button>
    </div>

    <div id="quiz-modal" class="fixed inset-0 z-50 flex items-center justify-center px-6">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl relative">
            <button onclick="closeQuiz()" class="absolute top-6 right-6 text-slate-300 text-xl">✕</button>
            <div class="text-center">
                <span class="text-[10px] font-black text-purple-400 uppercase tracking-widest mb-2 block">QUIZ MODE</span>
                <h2 id="quiz-q" class="text-3xl font-black text-slate-800 mb-8">Word?</h2>
                <div id="quiz-options" class="space-y-3">
                    </div>
                <div id="quiz-feedback" class="mt-6 font-bold h-6"></div>
            </div>
        </div>
    </div>

    { en: "quarantine", zh: "隔離 (like 接觸者)", cat: "課堂" },
    { en: "immune", zh: "免疫的", cat: "課堂" },
    { en: "efficacy", zh: "效力", cat: "課堂" },
    
    { en: "electric", zh: "電子的", cat: "課堂2" },
    { en: "battery", zh: "電池", cat: "課堂2" },
    { en: "storage", zh: "儲存", cat: "課堂2" },
    { en: "grid", zh: "網格", cat: "課堂2" },
    { en: "scale", zh: "規模", cat: "課堂2" },
    { en: "solar", zh: "太陽的", cat: "課堂2" },

    { en: "cylindrical", zh: "圓柱", cat: "課堂2" },
    { en: "autopilot", zh: "自動駕駛", cat: "課堂2" },
    { en: "burdensome", zh: "有負擔的", cat: "課堂2" },

    { en: "supervision", zh: "監督", cat: "課堂2" },
    { en: "autonomous", zh: "獨立自主的 (adv.)", cat: "課堂2" },
    { en: "sensor", zh: "感應器", cat: "課堂2" },

    { en: "source", zh: "來源", cat: "課堂2" },

    { en: "mass-produced", zh: "大量生產", cat: "課堂2" }
];

    // ... 你的 library 陣列保持不變 ...

    let vocabs = JSON.parse(localStorage.getItem('vocab_quiz_v1')) || library;
    let currentFilter = '全部';
    
    // --- 新增：測驗狀態管理 ---
    let quizQueue = []; 
    let currentCorrectItem = null;

    function render() {
        const list = document.getElementById('vocab-list');
        list.innerHTML = '';
        const filtered = currentFilter === '全部' ? vocabs : vocabs.filter(v => v.cat === currentFilter);
        document.getElementById('count').innerText = filtered.length;

        filtered.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = "word-card bg-white p-6 rounded-3xl shadow-sm flex items-center justify-between";
            card.innerHTML = `
                <div class="flex-1" onclick="this.querySelector('.zh-text').classList.toggle('show')">
                    <span class="text-[9px] font-extrabold text-indigo-400 uppercase tracking-widest">${item.cat}</span>
                    <div class="text-xl font-bold text-slate-800 tracking-tight">${item.en}</div>
                    <div class="zh-text text-indigo-600 font-semibold text-base">${item.zh}</div>
                </div>
                <div class="flex gap-2">
                    <button onclick="speak('${item.en}')" class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center">🔊</button>
                    <button onclick="removeWord(${vocabs.indexOf(item)})" class="w-10 h-10 rounded-xl bg-red-50 text-red-400 flex items-center justify-center">🗑️</button>
                </div>
            `;
            list.appendChild(card);
        });
        localStorage.setItem('vocab_quiz_v1', JSON.stringify(vocabs));
    }

    // --- 優化後的 Quiz Logic ---
    function startQuiz() {
        const pool = currentFilter === '全部' ? vocabs : vocabs.filter(v => v.cat === currentFilter);
        if (pool.length < 4) return alert("單字量不足（至少需要 4 個才能測驗）");

        // 初始化這一輪的測驗隊列（複製一份並打亂）
        quizQueue = [...pool].sort(() => Math.random() - 0.5);
        
        document.getElementById('quiz-modal').style.display = 'flex';
        nextQuestion();
    }

    function nextQuestion() {
        const feedback = document.getElementById('quiz-feedback');
        const pool = currentFilter === '全部' ? vocabs : vocabs.filter(v => v.cat === currentFilter);

        // 如果這一輪考完了，重新開始新的一輪
        if (quizQueue.length === 0) {
            feedback.innerText = "🎉 這一輪考完囉！即將開始新的一輪";
            feedback.className = "mt-6 font-bold text-indigo-500";
            setTimeout(() => {
                quizQueue = [...pool].sort(() => Math.random() - 0.5);
                nextQuestion();
            }, 2000);
            return;
        }

        feedback.innerText = `剩餘題數: ${quizQueue.length}`;
        feedback.className = "mt-6 text-xs text-slate-400";

        // 從隊列中取出第一個單字（確保不重複）
        currentCorrectItem = quizQueue.shift();
        document.getElementById('quiz-q').innerText = currentCorrectItem.zh;

        // 生成選項（從原始 pool 找錯誤選項）
        let options = [currentCorrectItem.en];
        while (options.length < 4) {
            let r = pool[Math.floor(Math.random() * pool.length)].en;
            if (!options.includes(r)) options.push(r);
        }
        options.sort(() => Math.random() - 0.5);

        const container = document.getElementById('quiz-options');
        container.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "option-btn w-full p-4 rounded-2xl bg-slate-50 text-slate-700 font-bold border-2 border-transparent transition-all";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt);
            container.appendChild(btn);
        });
    }

    function checkAnswer(btn, opt) {
        const feedback = document.getElementById('quiz-feedback');
        if (opt === currentCorrectItem.en) {
            btn.classList.add('border-emerald-500', 'bg-emerald-50', 'text-emerald-700');
            feedback.innerText = "✨ Correct!";
            feedback.className = "mt-6 font-bold text-emerald-500";
            // 答對了，1秒後進入下一題
            setTimeout(() => nextQuestion(), 1000);
        } else {
            btn.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
            feedback.innerText = "❌ Try Again";
            feedback.className = "mt-6 font-bold text-red-500";
        }
    }

    function closeQuiz() { 
        document.getElementById('quiz-modal').style.display = 'none'; 
        quizQueue = []; // 關閉時清空隊列
    }

    // ... 其餘的 Helper Functions (setFilter, add-btn, shuffle, removeWord, resetData, speak) 
    window.setFilter = (cat) => {
    currentFilter = cat;
    
    // 取得所有的按鈕
    document.querySelectorAll('.tab-btn').forEach(b => {
        // 修改這裡：改用參數與按鈕文字「完全相等」來判斷
        // 或者更嚴謹一點，檢查按鈕點擊時傳入的那個值
        const buttonText = b.innerText.trim();
        const isActive = (buttonText === cat);
        
        if (isActive) {
            b.className = "tab-btn active bg-white text-indigo-600 shadow-lg px-6 py-3 rounded-2xl text-sm font-bold transition-all border border-indigo-50";
        } else {
            b.className = "tab-btn bg-white/80 text-slate-500 shadow-sm px-6 py-3 rounded-2xl text-sm font-bold transition-all";
        }
    });
    render();
};


    document.getElementById('add-btn').onclick = () => {
        const en = document.getElementById('en-input').value;
        const zh = document.getElementById('zh-input').value;
        const cat = document.getElementById('cat-input').value;
        if(en && zh) {
            vocabs.unshift({en, zh, cat});
            document.getElementById('en-input').value = '';
            document.getElementById('zh-input').value = '';
            render();
        }
    };

    window.shuffle = () => { vocabs.sort(() => Math.random() - 0.5); render(); };
    window.removeWord = (i) => { vocabs.splice(i, 1); render(); };
    window.resetData = () => { if(confirm("還原預設資料庫？")) { vocabs = [...library]; render(); } };
    window.speak = (t) => {
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'en-US';
        speechSynthesis.speak(m);
    };

    render();
</script>

</body>
</html>
