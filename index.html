<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vocab Master - Quiz Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .glass-header { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .word-card { border-left: 4px solid #6366f1; transition: all 0.2s; }
        .zh-text { max-height: 0; overflow: hidden; transition: all 0.3s ease; opacity: 0; }
        .zh-text.show { max-height: 100px; opacity: 1; margin-top: 8px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #quiz-modal { display: none; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); }
        .option-btn:active { transform: scale(0.98); }
        .tab-btn.active { background: white; color: #6366f1; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.2); border: 1px solid rgba(99, 102, 241, 0.1); }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <div class="glass-header safe-top pb-10 px-6 text-white shadow-2xl rounded-b-[50px]">
        <div class="pt-8 flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight">Vocab Master</h1>
                <p class="text-white/70 text-xs">智能測驗口袋書 v2.0</p>
            </div>
            <button onclick="resetData()" class="p-2 bg-white/10 rounded-full text-[10px] font-bold">RESET</button>
        </div>
        <div class="mt-8 flex justify-between items-end">
            <div>
                <span class="text-6xl font-extrabold" id="count">0</span>
                <span class="text-sm font-semibold opacity-80 ml-1">WORDS</span>
            </div>
            <button onclick="shuffle()" class="bg-white/20 hover:bg-white/30 backdrop-blur-lg px-6 py-3 rounded-2xl text-sm font-bold transition-all flex items-center gap-2">
                🔀 隨機亂序
            </button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="flex gap-3 px-6 -mt-6 overflow-x-auto no-scrollbar relative z-10">
        <button onclick="setFilter('全部')" class="tab-btn active px-8 py-4 rounded-2xl text-sm font-bold transition-all whitespace-nowrap bg-white/80 text-slate-500 shadow-sm">全部</button>
        <button onclick="setFilter('課堂')" class="tab-btn px-8 py-4 rounded-2xl text-sm font-bold transition-all whitespace-nowrap bg-white/80 text-slate-500 shadow-sm">課堂</button>
        <button onclick="setFilter('課堂2')" class="tab-btn px-8 py-4 rounded-2xl text-sm font-bold transition-all whitespace-nowrap bg-white/80 text-slate-500 shadow-sm">課堂2</button>
        <button onclick="setFilter('課堂3')" class="tab-btn px-8 py-4 rounded-2xl text-sm font-bold transition-all whitespace-nowrap bg-white/80 text-slate-500 shadow-sm">課堂3</button>
    </div>

    <!-- Input Area -->
    <div class="px-6 mt-10">
        <div class="bg-white p-6 rounded-[35px] shadow-sm border border-slate-100">
            <div class="grid grid-cols-1 gap-3">
                <input type="text" id="en-input" placeholder="English Word" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-400 outline-none font-semibold">
                <input type="text" id="zh-input" placeholder="中文翻譯" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-400 outline-none font-semibold">
                <div class="flex gap-3">
                    <select id="cat-input" class="bg-slate-50 rounded-2xl px-4 text-slate-500 font-bold text-sm outline-none">
                        <option value="課堂">課堂</option>
                        <option value="課堂2">課堂2</option>
                        <option value="課堂3">課堂3</option>
                    </select>
                    <button id="add-btn" class="flex-1 bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 active:bg-indigo-700 transition-all">
                        ＋ 新增單字
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Word List -->
    <div id="vocab-list" class="px-6 mt-8 space-y-4"></div>

    <!-- Floating Start Button -->
    <div class="fixed bottom-8 left-0 right-0 px-8 z-40">
        <button onclick="startQuiz()" class="w-full bg-slate-900 text-white font-black py-6 rounded-[30px] shadow-2xl flex items-center justify-center gap-3 active:scale-95 transition-transform">
            <span class="text-xl">📝</span> 開始測驗模式
        </button>
    </div>

    <!-- Quiz Modal -->
    <div id="quiz-modal" class="fixed inset-0 z-50 flex items-center justify-center px-6">
        <div class="bg-white w-full max-w-md rounded-[45px] p-10 shadow-2xl relative">
            <button onclick="closeQuiz()" class="absolute top-8 right-8 text-slate-300 hover:text-slate-500 text-2xl transition-colors">✕</button>
            <div class="text-center">

                <div id="quiz-options" class="grid grid-cols-1 gap-4">
                    <!-- Options injected here -->
                </div>
                <div id="quiz-feedback" class="mt-8 font-extrabold h-8 text-lg"></div>
            </div>
        </div>

    // 狀態管理

    let currentFilter = '全部';
    let quizQueue = []; 
    let currentCorrectItem = null;

    // 渲染列表
    function render() {
        const list = document.getElementById('vocab-list');
        list.innerHTML = '';
        const filtered = currentFilter === '全部' ? vocabs : vocabs.filter(v => v.cat === currentFilter);
        document.getElementById('count').innerText = filtered.length;

        filtered.forEach((item) => {
            const card = document.createElement('div');
            card.className = "word-card bg-white p-6 rounded-[30px] shadow-sm flex items-center justify-between";
            card.innerHTML = `
                <div class="flex-1" onclick="this.querySelector('.zh-text').classList.toggle('show')">
                    <span class="text-[9px] font-black text-indigo-400 uppercase tracking-widest">${item.cat}</span>
                    <div class="text-xl font-bold text-slate-800 tracking-tight">${item.en}</div>
                    <div class="zh-text text-indigo-600 font-bold text-base">${item.zh}</div>
                </div>
                <div class="flex gap-2">
                    <button onclick="speak('${item.en}')" class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center text-xl">🔊</button>
                    <button onclick="deleteWord('${item.en}')" class="w-12 h-12 rounded-2xl bg-red-50 text-red-400 flex items-center justify-center">🗑️</button>
                </div>
            `;
            list.appendChild(card);
        });
        localStorage.setItem('vocab_quiz_v2', JSON.stringify(vocabs));
    }

    // 篩選功能
    window.setFilter = (cat) => {
        currentFilter = cat;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === cat);
        });
        render();
    };

    // 新增單字
    document.getElementById('add-btn').onclick = () => {
        const en = document.getElementById('en-input').value.trim();
        const zh = document.getElementById('zh-input').value.trim();
        const cat = document.getElementById('cat-input').value;
        if(en && zh) {
            vocabs.unshift({en, zh, cat});
            document.getElementById('en-input').value = '';
            document.getElementById('zh-input').value = '';
            render();
        }
    };

    // 測驗邏輯
    function startQuiz() {
        const pool = currentFilter === '全部' ? vocabs : vocabs.filter(v => v.cat === currentFilter);
        if (pool.length < 4) return alert("單字量不足（至少需要 4 個才能開始測驗）");

        quizQueue = [...pool].sort(() => Math.random() - 0.5);
        document.getElementById('quiz-modal').style.display = 'flex';
        nextQuestion();
    }

    function nextQuestion() {
        const feedback = document.getElementById('quiz-feedback');
        const pool = currentFilter === '全部' ? vocabs : vocabs.filter(v => v.cat === currentFilter);

        if (quizQueue.length === 0) {
            feedback.innerText = "🎉 恭喜！這輪測驗已完成！";
            feedback.className = "mt-8 font-black text-indigo-500 text-lg";
            setTimeout(() => closeQuiz(), 2000);
            return;
        }

        feedback.innerText = `⏳ 剩餘題數: ${quizQueue.length}`;
        feedback.className = "mt-8 text-sm text-slate-400 font-bold";

        currentCorrectItem = quizQueue.shift();
        document.getElementById('quiz-q').innerText = currentCorrectItem.zh;
        document.getElementById('quiz-progress').innerText = `Progress: ${quizQueue.length} left`;

        // 產生選項
        let options = [currentCorrectItem.en];
        while (options.length < 4) {
            let randomWord = pool[Math.floor(Math.random() * pool.length)].en;
            if (!options.includes(randomWord)) options.push(randomWord);
        }
        options.sort(() => Math.random() - 0.5);

        const container = document.getElementById('quiz-options');
        container.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "option-btn w-full p-5 rounded-[25px] bg-slate-50 text-slate-700 font-extrabold border-2 border-transparent transition-all hover:bg-slate-100";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt);
            container.appendChild(btn);
        });
    }

    function checkAnswer(btn, opt) {
        const feedback = document.getElementById('quiz-feedback');
        const allBtns = document.querySelectorAll('.option-btn');
        
        if (opt === currentCorrectItem.en) {
            btn.classList.add('border-emerald-500', 'bg-emerald-50', 'text-emerald-700');
            feedback.innerText = "✨ 太棒了！答對了";
            feedback.className = "mt-8 font-black text-emerald-500 text-lg";
            allBtns.forEach(b => b.onclick = null); // 防止連續點擊
            setTimeout(nextQuestion, 1000);
        } else {
            btn.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
            feedback.innerText = "❌ 再試一次！";
            feedback.className = "mt-8 font-black text-red-500 text-lg";
        }
    }

    function closeQuiz() { 
        document.getElementById('quiz-modal').style.display = 'none'; 
        quizQueue = [];
    }

    // 工具函數
    window.shuffle = () => {
        vocabs.sort(() => Math.random() - 0.5);
        render();
    };

    window.deleteWord = (en) => {
        vocabs = vocabs.filter(v => v.en !== en);
        render();
    };

    window.resetData = () => {
        if(confirm("確定要重置資料庫並恢復預設單字嗎？")) {
            vocabs = [...library];
            render();
        }
    };

    window.speak = (text) => {
        window.speechSynthesis.cancel(); // 先取消之前的語音
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    };

    // 初始化
    render();
</script>

</body>
</html>
